kind = "mobile"
previewPath = "/"
title = "Lubaki Autoeskola"
version = "1.0.0"
id = "artifacts/lubaki-autoeskola"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19783

[services.development]
run = "pnpm --filter @workspace/lubaki-autoeskola run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lubaki-autoeskola", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lubaki-autoeskola", "run", "serve" ]

[services.env]
PORT = "19783"
BASE_PATH = "/"
